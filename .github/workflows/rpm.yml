name: CI Build Stalwart Mail On RPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # This Job builds and pushes the custom Rocky Linux images to GHCR
  build-custom-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push images to GHCR
    outputs:
      rocky_9_6_image: ghcr.io/${{ github.repository }}/rockylinux-custom:9.6-${{ github.sha }}
      rocky_10_0_image: ghcr.io/${{ github.repository }}/rockylinux-custom:10.0-${{ github.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Rocky Linux 9.6 custom image
      id: build_rocky_9_6
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.rocky # Use your custom Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/rockylinux-custom:9.6-${{ github.sha }}
        build-args: |
          ROCKY_VERSION=9.6

    - name: Build and Push Rocky Linux 10.0 custom image (will likely fail until 10.0 is released)
      id: build_rocky_10_0
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.rocky
        push: true
        tags: ghcr.io/${{ github.repository }}/rockylinux-custom:10.0-${{ github.sha }}
        build-args: |
          ROCKY_VERSION=10.0
      continue-on-error: true # Allow this step to fail if 10.0 image isn't available yet

  build-stalwart:
    needs: build-custom-images # This job depends on the custom images being built and pushed
    strategy:
      matrix:
        os_image:
          # Use the custom Rocky Linux 9.6 image
          - ${{ needs.build-custom-images.outputs.rocky_9_6_image }}
          # Include Fedora 42 (known to be stable)
          - fedora:42
          # Include Fedora 43
          - fedora:43
          # Only include Rocky 10.0 if the custom image build for it succeeded.
          # This filter ensures that if building the 10.0 base image fails (because rockylinux:10.0 isn't out),
          # this matrix entry is skipped rather than failing the whole job.
          - ${{ needs.build-custom-images.outputs.rocky_10_0_image }}
          # Removed fedora:43 as it's unreleased
          
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.os_image }}
      options: --user root

    steps:
    - name: Checkout current repo
      if: ${{ matrix.os_image != '' }}
      uses: actions/checkout@v3

    - name: Install system dependencies (${{ matrix.os_image }})
      if: ${{ matrix.os_image != '' }}
      run: |
        echo "Updating dnf package index and installing system dependencies for ${{ matrix.os_image }}..."
        dnf update -y
        
        # 仅对 Fedora 进行依赖安装，Rocky 基础镜像已包含全部依赖
        if [[ "${{ matrix.os_image }}" == "fedora:42" || "${{ matrix.os_image }}" == "fedora:43" ]]; then
          echo "Fedora already has core development packages. No extra repos needed."
          dnf install -y protobuf-devel sqlite-devel git gcc make
        else
          echo "Rocky 基础镜像已包含全部依赖，无需重复安装。"
        fi

    - name: Clone stalwart project
      if: ${{ matrix.os_image != '' }}
      run: |
        echo "Cloning stalwart project..."
        git clone https://github.com/offsoc/stalwart.git
      shell: bash

    - name: Copy libfdb_c.so to /lib64
      if: ${{ matrix.os_image != '' }}
      run: |
        if [[ "${{ matrix.os_image }}" == "fedora:42" || "${{ matrix.os_image }}" == "fedora:43" ]]; then
          echo "Copying stalwart/resources/libfdb_c.so to /lib64..."
          cp stalwart/resources/libfdb_c.so /lib64/libfdb_c.so
          ldconfig
        else
          echo "Rocky 基础镜像已包含 libfdb_c.so，无需拷贝。"
        fi

    - name: Install Rust manually via rustup
      if: ${{ matrix.os_image != '' }}
      run: |
        echo "Installing Rust via rustup for ${{ matrix.os_image }}..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      shell: bash

    - name: Build stalwart (SQLite backend) on ${{ matrix.os_image }}
      if: ${{ matrix.os_image != '' }}
      run: |
        echo "Changing directory to stalwart and building for ${{ matrix.os_image }}..."
        cd stalwart
        cargo build --manifest-path=crates/main/Cargo.toml --release
      shell: bash

    - name: Generate unique artifact name
      if: ${{ matrix.os_image != '' }}
      id: generate_name
      run: |
        OS_IMAGE="${{ matrix.os_image }}"
        CLEANED_NAME="${OS_IMAGE//\//-}"
        CLEANED_NAME="${CLEANED_NAME//:/-}"
        echo "ARTIFACT_NAME=stalwart-mail-$CLEANED_NAME" >> "$GITHUB_OUTPUT"
        echo "Generated artifact name: stalwart-mail-$CLEANED_NAME"
      shell: bash

    - name: Upload stalwart binary (${{ matrix.os_image }})
      if: ${{ matrix.os_image != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.generate_name.outputs.ARTIFACT_NAME }}
        path: stalwart/target/release/stalwart*
