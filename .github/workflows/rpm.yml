name: CI Build Stalwart Mail On RPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 此 Job 用于构建和推送自定义 Rocky Linux 镜像到 GHCR
  build-custom-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送镜像到 GHCR 需要此权限
    outputs:
      # 传递镜像标签，以便下游 Job 可以使用它们
      rocky_9_6_image: ${{ steps.build_rocky_9_6.outputs.image }}
      rocky_10_0_image: ${{ steps.build_rocky_10_0.outputs.image }} # 留着以备 10.0 稳定时使用

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Rocky Linux 9.6 custom image
      id: build_rocky_9_6
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.rocky # 使用你自定义的 Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/rockylinux-custom:9.6-${{ github.sha }}
        build-args: |
          ROCKY_VERSION=9.6
      outputs:
        image: ghcr.io/${{ github.repository }}/rockylinux-custom:9.6-${{ github.sha }}

    - name: Build and Push Rocky Linux 10.0 custom image (在 10.0 发布前可能会失败)
      id: build_rocky_10_0
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.rocky
        push: true
        tags: ghcr.io/${{ github.repository }}/rockylinux-custom:10.0-${{ github.sha }}
        build-args: |
          ROCKY_VERSION=10.0
      outputs:
        image: ghcr.io/${{ github.repository }}/rockylinux-custom:10.0-${{ github.sha }}
      continue-on-error: true # 允许此步骤失败，如果 10.0 镜像尚不可用

  build-stalwart:
    needs: build-custom-images # 此 Job 依赖于自定义镜像的构建和推送
    strategy:
      matrix:
        os_image:
          # 使用自定义的 Rocky Linux 9.6 镜像
          - ${{ needs.build-custom-images.outputs.rocky_9_6_image }}
          # 包含 Fedora 42 (已知稳定)
          - fedora:42
          # 仅当自定义 10.0 镜像构建成功时才包含 Rocky 10.0。
          # 这样可以确保如果构建 10.0 基础镜像失败（因为 rockylinux:10.0 还没发布），
          # 这个 matrix 条目会被跳过，而不是导致整个 Job 失败。
          - ${{ fromJson(format('{{"include": [{{"os_image": "{0}"}}]}}', needs.build-custom-images.outputs.rocky_10_0_image)).include[0].os_image if success() && needs.build-custom-images.outputs.rocky_10_0_image != '' }}
          # 移除了 fedora:43，因为它尚未发布
          
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.os_image }}
      options: --user root

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v3

    - name: Install system dependencies (${{ matrix.os_image }})
      run: |
        echo "Updating dnf package index and installing system dependencies for ${{ matrix.os_image }}..."
        dnf update -y
        
        # 检查是否是我们自定义的 Rocky Linux 镜像
        if [[ "${{ matrix.os_image }}" =~ ^ghcr\.io/.*/rockylinux-custom:9\.6- ]]; then
          echo "Configuring repositories for custom Rocky Linux 9.6 image..."
          # 这些在 Dockerfile.rocky 中已安装，但 CRB/EPEL 仍需在此处启用
          dnf config-manager --set-enabled crb
          dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
        elif [[ "${{ matrix.os_image }}" =~ ^ghcr\.io/.*/rockylinux-custom:10\.0- ]]; then
          echo "Configuring repositories for custom Rocky Linux 10.0 image..."
          dnf config-manager --set-enabled crb
          dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
        elif [[ "${{ matrix.os_image }}" == "fedora:42" ]]; then
          echo "Fedora 42 already has core development packages. No extra repos needed."
        else
          echo "Unknown OS image: ${{ matrix.os_image }}. Proceeding without specific repo config."
        fi

        # 在配置完仓库后安装通用依赖项
        # bash 现在由 Dockerfile.rocky 安装，但此处保留以保持 Fedora 的一致性
        dnf install -y protobuf-devel sqlite-devel git gcc make
        
    - name: Clone stalwart project
      run: |
        echo "Cloning stalwart project..."
        git clone https://github.com/offsoc/stalwart.git
      shell: bash

    - name: Copy libfdb_c.so to /lib64
      run: |
        echo "Copying stalwart/resources/libfdb_c.so to /lib64..."
        cp stalwart/resources/libfdb_c.so /lib64/libfdb_c.so
        ldconfig
      shell: bash

    - name: Install FoundationDB client (optional - .deb is not for RPM-based Linux)
      run: |
        echo "--------------------------------------------------------------------------------"
        echo "WARNING: Skipping FoundationDB client .deb package installation for ${{ matrix.os_image }}."
        echo "         .deb packages are NOT compatible with Rocky Linux or Fedora environments."
        echo "         If FoundationDB support is critical for stalwart, you MUST:"
        echo "         1. Find an official FoundationDB RPM package for your OS,"
        "         2. OR Compile FoundationDB client libraries from source for your OS."
        echo "--------------------------------------------------------------------------------"
      shell: bash

    - name: Install Rust manually via rustup
      run: |
        echo "Installing Rust via rustup for ${{ matrix.os_image }}..."
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      shell: bash

    - name: Build stalwart (SQLite backend) on ${{ matrix.os_image }}
      run: |
        echo "Changing directory to stalwart and building for ${{ matrix.os_image }}..."
        cd stalwart
        cargo build --manifest-path=crates/main/Cargo.toml --release
      shell: bash

    - name: Generate unique artifact name
      id: generate_name
      run: |
        OS_IMAGE="${{ matrix.os_image }}"
        CLEANED_NAME="${OS_IMAGE//\//-}"
        CLEANED_NAME="${CLEANED_NAME//:/-}"
        echo "ARTIFACT_NAME=stalwart-mail-$CLEANED_NAME" >> "$GITHUB_OUTPUT"
        echo "Generated artifact name: stalwart-mail-$CLEANED_NAME"
      shell: bash

    - name: Upload stalwart binary (${{ matrix.os_image }})
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.generate_name.outputs.ARTIFACT_NAME }}
        path: stalwart/target/release/stalwart*
