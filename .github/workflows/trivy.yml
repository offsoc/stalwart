name: Trivy CI - Multi-Arch

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '00 12 * * *'

permissions:
  contents: read

jobs:
  trivy-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ----------------------------
      # 设置安全平台变量
      # ----------------------------
      - name: Set safe platform name
        id: safe-platform
        run: |
          SAFE_PLATFORM=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "SAFE_PLATFORM=$SAFE_PLATFORM" >> $GITHUB_ENV

      # ----------------------------
      # Build Docker image (multi-arch)
      # ----------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch Docker image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag ghcr.io/offsoc/stalwart:test-scan-${{ env.SAFE_PLATFORM }} \
            --load \
            .

      # ----------------------------
      # Scan filesystem
      # ----------------------------
      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results-${{ env.SAFE_PLATFORM }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results-${{ env.SAFE_PLATFORM }}.sarif

      # ----------------------------
      # Scan Docker image
      # ----------------------------
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/offsoc/stalwart:test-scan-${{ env.SAFE_PLATFORM }}
          format: sarif
          output: trivy-image-results-${{ env.SAFE_PLATFORM }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Docker image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results-${{ env.SAFE_PLATFORM }}.sarif
